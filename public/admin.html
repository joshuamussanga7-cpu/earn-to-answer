<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnToAnswer | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .admin-wrapper { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .admin-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .table-container { overflow-x: auto; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-pending { background: var(--warning); color: white; }
        .status-paid { background: var(--success); color: white; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
            <h1><i class='bx bxs-shield-quarter'></i> Admin Dashboard</h1>
            <button class="btn btn-outline" onclick="location.href='index.html'">Go to App</button>
        </div>

        <div class="stat-grid">
            <div class="admin-card">
                <p style="color:var(--text-muted);">Total Users</p>
                <h2 id="admin-total-users">0</h2>
            </div>
            <div class="admin-card">
                <p style="color:var(--text-muted);">Total Payouts</p>
                <h2 id="admin-total-payouts">$0.00</h2>
            </div>
            <div class="admin-card">
                <p style="color:var(--text-muted);">Pending Requests</p>
                <h2 id="admin-pending-req">0</h2>
            </div>
            <div class="admin-card">
                <p style="color:var(--text-muted);">Global Balance</p>
                <h2 id="admin-global-bal">$0.00</h2>
            </div>
        </div>

        <div class="admin-card">
            <h3>Pending Withdrawals</h3>
            <div class="table-container" style="margin-top:20px;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>User Email</th>
                            <th>Amount</th>
                            <th>USDT Address</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="payout-requests-body">
                        <!-- Pending payouts here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB_J-33kRosjVKdKa0FDmIWg04pTtU5CY",
            authDomain: "earn-to-answer-b7cd0.firebaseapp.com",
            projectId: "earn-to-answer-b7cd0",
            storageBucket: "earn-to-answer-b7cd0.firebasestorage.app",
            messagingSenderId: "1074144496696",
            appId: "1:1074144496696:web:bb4695d8cf8760de83eacd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Global Stats
        async function loadStats() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                document.getElementById('admin-total-users').innerText = snapshot.size;
                let globalBal = 0;
                snapshot.forEach(doc => globalBal += (doc.data().balance || 0));
                document.getElementById('admin-global-bal').innerText = `$${globalBal.toFixed(2)}`;
            });

            onSnapshot(query(collection(db, "payouts"), where("status", "==", "Paid")), (snapshot) => {
                let totalPaid = 0;
                snapshot.forEach(doc => totalPaid += (doc.data().amount || 0));
                document.getElementById('admin-total-payouts').innerText = `$${totalPaid.toFixed(2)}`;
            });
        }

        // Load Withdrawal Requests
        function loadPayoutRequests() {
            const q = query(collection(db, "payouts"), where("status", "==", "Pending"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const body = document.getElementById('payout-requests-body');
                document.getElementById('admin-pending-req').innerText = snapshot.size;
                body.innerHTML = snapshot.empty ? "<tr><td colspan='4'>No pending requests.</td></tr>" : "";

                snapshot.forEach((pDoc) => {
                    const data = pDoc.data();
                    const row = document.createElement('tr');
                    row.className = "history-row";
                    row.innerHTML = `
                        <td>${data.email}</td>
                        <td style="font-weight:700;">$${data.amount.toFixed(2)}</td>
                        <td><code style="background:#f1f5f9; padding:4px 8px; border-radius:4px;">${data.address}</code></td>
                        <td>
                            <button class="btn btn-sm" onclick="approvePayout('${pDoc.id}')">Mark as Paid</button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            });
        }

        window.approvePayout = async (payoutId) => {
            if (confirm("Confirm that you have sent the USDT to this address?")) {
                try {
                    await updateDoc(doc(db, "payouts", payoutId), {
                        status: "Paid",
                        paidAt: new Date().toISOString()
                    });
                    alert("Payout marked as paid!");
                } catch (error) {
                    alert(error.message);
                }
            }
        };

        loadStats();
        loadPayoutRequests();
    </script>
</body>
</html>
