<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn to Answer | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #2ecc71;
            color: white;
        }
        .admin-container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="header-row">
            <h1>Admin Payout Panel</h1>
            <p>Manage user balances and confirm USDT transfers.</p>
        </header>

        <div class="card">
            <table id="users-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Balance (USDT)</th>
                        <th>Wallet Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-user-list">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </div>

        <br>
        <button class="btn btn-outline" onclick="window.location.href='index.html'"><i class='bx bx-arrow-back'></i> Back to Dashboard</button>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
